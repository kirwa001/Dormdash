<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #2c3e50; color: white; }
        .header { background: #1e2b38; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 1.5em; }
        .header a { color: white; text-decoration: none; background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 5px; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; color: black; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); text-align: center; }
        .stat-card h3 { margin: 0 0 10px; color: #2c3e50; font-size: 1em; }
        .stat-card .number { font-size: 2.5em; font-weight: bold; color: #2c3e50; }
        .nav-links { display: flex; gap: 15px; justify-content: center; }
        .nav-links a { background: white; color: #2c3e50; padding: 15px 25px; border-radius: 8px; text-decoration: none; box-shadow: 0 2px 8px rgba(0,0,0,0.2); font-weight: 600; }
        .nav-links a:hover { background: #f5f5f5; }
    </style>
</head>
<body>
    <div class="header">
        <h1>DormDash Admin</h1>
        <a href="{{ url_for('admin_logout') }}">Logout</a>
    </div>
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <h3>Total Orders</h3>
                <div class="number">{{ total_orders }}</div>
            </div>
            <div class="stat-card">
                <h3>Pending</h3>
                <div class="number">{{ pending_orders }}</div>
            </div>
            <div class="stat-card">
                <h3>Paid</h3>
                <div class="number">{{ paid_orders }}</div>
            </div>
            <div class="stat-card">
                <h3>Delivered</h3>
                <div class="number">{{ delivered_orders }}</div>
            </div>
            <div class="stat-card">
                <h3>Revenue (KES)</h3>
                <div class="number">{{ revenue }}</div>
            </div>
            <div class="stat-card">
                <h3>Active Customers</h3>
                <div class="number">{{ total_customers }}</div>
            </div>
        </div>

        <div class="nav-links">
            <a href="{{ url_for('admin_orders') }}">📋 View All Orders</a>
            <a href="{{ url_for('home') }}" target="_blank">🏠 Public Site</a>
        </div>
    </div>
</body>
</html>
